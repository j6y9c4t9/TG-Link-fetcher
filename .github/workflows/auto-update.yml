name: Auto Update Clash Config

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时自动运行一次
  workflow_dispatch:      # 允许在 GitHub 网页手动点击触发

jobs:
  build:
    runs-on: ubuntu-latest

    # 关键点：显式声明 GITHUB_TOKEN 的权限，确保有权删除历史运行记录和提交代码
    permissions:
      actions: write
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pyyaml

    - name: Run Parser Script
      run: python parser.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        if [ -f "config.yaml" ]; then
          git add config.yaml
          # 如果文件有修改则提交，没有修改则直接跳过，防止 Actions 报错
          git diff-index --quiet HEAD || git commit -m "🤖 自动更新节点配置 [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
        else
          echo "未生成 config.yaml，跳过提交"
        fi

    # 新增功能：清理旧的部署日志（保留最近3天或至少保留1个）
    - name: Delete old workflow runs
      if: always() # 确保前面的步骤无论成功还是失败，都会执行清理
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 3
        keep_minimum_runs: 1
