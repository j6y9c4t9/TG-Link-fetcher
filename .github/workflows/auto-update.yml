name: Auto Update Clash Config

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时自动运行一次
  workflow_dispatch:      # 允许在 GitHub 网页手动点击触发

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pyyaml

    - name: Run Parser Script
      run: python parser.py

    - name: Commit and Push Changes
      id: git_push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        if [ -f "config.yaml" ]; then
          git add config.yaml
          if ! git diff-index --quiet HEAD; then
            git commit -m "🤖 自动更新节点配置 [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "节点内容无变化，跳过提交"
            echo "updated=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "未生成 config.yaml，跳过提交"
          echo "updated=false" >> $GITHUB_OUTPUT
        fi

    - name: Send Telegram Notification
      if: "success() && steps.git_push.outputs.updated == 'true'"
      env:
        TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # 设置时区为北京时间
        export TZ='Asia/Shanghai'

        # 1. 读取 Python 生成的统计报告并净化格式
        if [ -f "summary.txt" ]; then
          DETAILS=$(cat summary.txt | sed 's/\*//g' | sed 's/`/""/g')
        else
          DETAILS="暂无详细统计数据"
        fi

        # 2. 使用安全的 HTML 标签拼接消息
        MESSAGE=$(printf "🚀 <b>Clash 配置自动更新成功！</b>\n\n📅 时间: $(date +'%Y-%m-%d %H:%M:%S') (北京时间)\n\n📊 <b>节点筛选详情:</b>\n%s\n\n🔗 链接: <a href=\"https://raw.githubusercontent.com/%s/main/config.yaml\">点击查看Raw配置</a>" "${DETAILS}" "${{ github.repository }}")

        # 3. 发送请求到 Telegram Bot API
        curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
          -d "chat_id=${TG_CHAT_ID}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=HTML" \
          -d "disable_web_page_preview=true"

    # 清理旧的部署日志
    - name: Delete old workflow runs
      if: always()
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 3
        keep_minimum_runs: 1
