name: Auto Fetch TG Links (Web Version)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.2 

    - name: Set up Python
      uses: actions/setup-python@v5.3.0
      with:
        # ⭐ 加上这一行，彻底解决 "python-version is not set" 的提示
        python-version: '3.10' 

    - name: Run script
      env:
        TG_CHANNEL: 'freeVPNjd' 
      run: python fetch_links.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        touch subscribe.txt
        git add subscribe.txt
        
        if git diff --staged --quiet; then
          echo "ℹ️ 节点内容没有变化，无需更新。"
        else
          git commit -m "Update links $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
