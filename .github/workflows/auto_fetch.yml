name: Auto Fetch TG Links (Web Version)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.2 

    - name: Set up Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.10' 

    # 1. 运行脚本并将日志存入 run.log，同时在控制台显示
    - name: Run script
      id: run_script
      continue-on-error: true # 即使脚本报错，也让后面的步骤（包括通知）继续执行
      env:
        TG_CHANNEL: 'freeVPNjd' 
      run: python fetch_links.py | tee run.log

    # 2. 读取 run.log 内容并存入 GITHUB_OUTPUT
    - name: Read log content
      id: read_log
      if: always()
      run: |
        # 读取日志文件内容
        LOG_CONTENT=$(cat run.log)
        # 使用 EOF 格式处理多行文本，防止格式混乱
        echo "LOG_OUTPUT<<EOF" >> $GITHUB_OUTPUT
        echo "$LOG_CONTENT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    # 3. 提交代码（仅在脚本成功的前提下）
    - name: Commit and Push changes
      if: steps.run_script.outcome == 'success'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        touch config.yaml
        git add config.yaml
        if git diff --staged --quiet; then
          echo "ℹ️ 内容无变化。"
        else
          git commit -m "Update Clash Config $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi

    # 4. 发送 Telegram 通知（包含详细运行日志）
    - name: Send telegram notification
      if: always()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        # 这里直接引用了上面读取的 LOG_OUTPUT
        message: |
          🚀 *GitHub Actions 运行日志*
          状态: ${{ steps.run_script.outcome == 'success' && '✅ 成功' || '❌ 失败' }}
          
          日志详情:
          ${{ steps.read_log.outputs.LOG_OUTPUT }}

    - name: Delete old workflow runs
      if: always()
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 3
        keep_minimum_runs: 1
