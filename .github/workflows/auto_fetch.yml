name: Auto Fetch TG Links (Web Version)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.2 

    - name: Set up Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.10' 

    - name: Run script
      env:
        TG_CHANNEL: 'freeVPNjd' 
      run: python fetch_links.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        touch config.yaml
        git add config.yaml
        if git diff --staged --quiet; then
          echo "ℹ️ 内容无变化。"
        else
          git commit -m "Update Clash Config $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi

    # 🎯 新增：任务成功通知
    - name: Send success notification
      if: success()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ✅ GitHub Actions 运行成功！
          仓库: ${{ github.repository }}
          状态: 节点已同步并更新。

    # 🎯 新增：任务失败通知（非常重要，脚本崩溃时提醒你）
    - name: Send failure notification
      if: failure()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ❌ GitHub Actions 运行失败！
          仓库: ${{ github.repository }}
          请检查 Action 执行日志：https://github.com/${{ github.repository }}/actions

    - name: Delete old workflow runs
      if: always()
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 3
        keep_minimum_runs: 1
