name: Auto Fetch TG Links (Web Version)

on:
  schedule:
    # 定时任务：每 6 小时自动运行一次 (UTC 时间 00:00, 06:00, 12:00, 18:00)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击按钮立即运行

jobs:
  fetch:
    runs-on: ubuntu-latest

    # 赋予 Actions 写入仓库的权限（必须，否则无法保存结果文件）
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run script
      env:
        # 🔒 这里已经锁定了你的目标频道 freeVPNjd
        TG_CHANNEL: 'freeVPNjd' 
      run: python fetch_links.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add subscribe.txt
        # 只有在文件内容有变动时才提交，防止未更新时报错
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update links $(date +'%Y-%m-%d %H:%M:%S')" && git push)
