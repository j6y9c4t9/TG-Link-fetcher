name: Auto Fetch TG Links (Web Version)

on:
  schedule:
    # 定时任务：每 6 小时自动运行一次
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许手动点击运行

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    # 赋予 Actions 写入仓库和删除历史运行记录的权限
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.2 

    - name: Set up Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.10' 

    - name: Run script
      env:
        TG_CHANNEL: 'freeVPNjd' 
      run: python fetch_links.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 确保追踪 config.yaml 文件
        touch config.yaml
        git add config.yaml
        
        # 检查是否有内容变动
        if git diff --staged --quiet; then
          echo "ℹ️ 节点内容没有变化，无需更新。"
        else
          git commit -m "Update Clash Config $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi

    # 🎯 新增：强制执行自动清理 3 天前的旧运行历史，保持仓库干净
    - name: Delete old workflow runs
      if: always()
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 3
        keep_minimum_runs: 1
