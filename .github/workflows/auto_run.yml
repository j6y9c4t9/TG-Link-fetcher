name: Pure Node Aggregator and Provider Binder

on:
  schedule:
    - cron: '0 */3 * * *'  # 每 3 小时完全自动刷新
  workflow_dispatch:       # 支持手动点击触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python Dependencies
      run: |
        pip install pyyaml requests

    # 1. 运行全新的节点合流脚本，输出临时的大原材料文件
    - name: Run Raw Node Aggregator
      run: python parser.py

    # 2. 调用 Subconverter 官方二进制核心，进行绝对安全的格式规范化与模板拼装
    - name: Render Templates with Subconverter
      run: |
        wget https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz
        tar -zxf subconverter_linux64.tar.gz
        
        # 建立最终输出的文件夹
        mkdir -p output
        
        # 🌟 核心步骤：将合并好的原始节点转成纯节点列表提供者（Nodes Provider）
        ./subconverter/subconverter -g --generate \
          --target clash \
          --url ./output/raw_nodes.yaml \
          --output ./output/nodes.yaml

        # 🌟 联动合并任务一：将纯节点与你的标准模板合成最终的主配置文件
        if [ -f "./template/template.yaml" ]; then
          ./subconverter/subconverter -g --generate \
            --target mihomo \
            --url ./output/nodes.yaml \
            --extconfig ./template/template.yaml \
            --output ./output/config.yaml
        fi

        # 🌟 联动合并任务二：将纯节点与你的精简模板合成最终的智能主配置文件
        if [ -f "./template/template-smart.yaml" ]; then
          ./subconverter/subconverter -g --generate \
            --target mihomo \
            --url ./output/nodes.yaml \
            --extconfig ./template/template-smart.yaml \
            --output ./output/config-smart.yaml
        fi
        
        # 清理中转的大原材料文件
        rm -f ./output/raw_nodes.yaml
        echo "🟢 全新解耦的订阅转换与模板缝合已成功完成！"

    # 3. 推送所有生成的新配置回 GitHub 仓库
    - name: Commit and Push Files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add output/*
        
        if ! git diff --cached --quiet; then
          git commit -m "Automated config delivery via Subconverter [$(date '+%Y-%m-%d %H:%M:%S')]"
          git push
        else
          echo "节点与配置没有发生任何改变，跳过推送。"
        fi
