name: Convert Subscriptions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [urls.txt]
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Start subconverter
        run: |
          docker run -d \
            --name subconverter \
            -p 25500:25500 \
            tindy2013/subconverter:latest

          echo "等待 subconverter 启动..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:25500/version > /dev/null 2>&1; then
              echo "✅ subconverter 已就绪"
              curl -s http://127.0.0.1:25500/version
              break
            fi
            echo "  等待中... ($i/30)"
            sleep 1
          done

      - name: Run conversion
        run: python3 convert.py

      - name: Commit output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet && echo "无变更，跳过提交" && exit 0
          git commit -m "update clash config [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
