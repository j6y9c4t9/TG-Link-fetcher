name: Convert Subscriptions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [urls.txt]
  schedule:
    - cron: '0 */12 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start subconverter
        run: |
          docker run -d \
            --name subconverter \
            -p 25500:25500 \
            tindy2013/subconverter:latest

          echo "等待 subconverter 启动..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:25500/version > /dev/null 2>&1; then
              echo "✅ subconverter 已就绪"
              curl -s http://127.0.0.1:25500/version
              break
            fi
            echo "  等待中... ($i/30)"
            sleep 1
          done

      - name: Run conversion
        id: convert
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 script/convert.py

      - name: Commit output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet && echo "无变更，跳过提交" && exit 0
          if git log -1 --format='%s' | grep -q '^$$auto$$'; then
            git commit --amend --no-edit -m "[auto] update clash [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          else
            git commit -m "[auto] update clash [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          fi
          git push --force-with-lease

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
        run: |
          BJT_NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # ── Telegram 通知 ──
          MSG="❌ <b>订阅转换失败</b>
          🕐 ${BJT_NOW} (北京时间)
          📋 <a href=\"${RUN_URL}\">点击查看日志</a>"
          jq -n --arg chat "$TELEGRAM_CHAT_ID" --arg text "$MSG" \
            '{chat_id:$chat, text:$text, parse_mode:"HTML", disable_web_page_preview:true}' \
            | curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" -d @-

          # ── WxPusher 通知 ──
          if [ -n "$WXPUSHER_APP_TOKEN" ] && [ -n "$WXPUSHER_UIDS" ]; then
            # 将逗号分隔的 UID 字符串转为 JSON 数组
            WX_UIDS_JSON=$(echo "$WXPUSHER_UIDS" | tr ',' '\n' | jq -R . | jq -s .)
            WX_CONTENT="**❌ 订阅转换失败**
          - 🕐 ${BJT_NOW} (北京时间)
          - 📋 [点击查看日志](${RUN_URL})"
            jq -n \
              --arg token "$WXPUSHER_APP_TOKEN" \
              --arg content "$WX_CONTENT" \
              --argjson uids "$WX_UIDS_JSON" \
              '{appToken:$token, content:$content, summary:"订阅转换失败", contentType:3, uids:$uids}' \
              | curl -s -X POST "https://wxpusher.zjiecode.com/api/send/message" \
                -H "Content-Type: application/json" -d @-
            echo "✅ WxPusher 通知已发送"
          else
            echo "未配置 WxPusher，跳过微信通知"
          fi
