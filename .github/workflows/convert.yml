name: Convert Subscriptions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [urls.txt]
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Start subconverter
        run: |
          docker run -d \
            --name subconverter \
            -p 25500:25500 \
            tindy2013/subconverter:latest

          echo "等待 subconverter 启动..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:25500/version > /dev/null 2>&1; then
              echo "✅ subconverter 已就绪"
              curl -s http://127.0.0.1:25500/version
              break
            fi
            echo "  等待中... ($i/30)"
            sleep 1
          done

      - name: Run conversion
        id: convert
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 script/convert.py

      - name: Commit output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet && echo "无变更，跳过提交" && exit 0
          git commit -m "update clash config [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BJT_NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="❌ <b>订阅转换失败</b>
          🕐 ${BJT_NOW} (北京时间)
          📋 详情: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"${MSG}\",\"parse_mode\":\"HTML\",\"disable_web_page_preview\":true}"
