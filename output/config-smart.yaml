- type: fallback
  url: https://www.gstatic.com/generate_204
  interval: 300
  empty-fallback: REJECT
  name: 故障转移
  proxies:
  - 香港策略
  - 台湾策略
  - 狮城策略
  - 日本策略
  - 美国策略
  icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/ULB.png
- type: smart
  url: https://www.gstatic.com/generate_204
  interval: 300
  uselightgbm: false
  collectdata: false
  strategy: sticky-sessions
  empty-fallback: REJECT
  include-all: true
  hidden: true
  tolerance: 50
  name: 全球自动
  icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Rainbow.png
- name: 全球手动
  type: select
  include-all: true
  icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Clubhouse.png
- name: Emby策略
  type: select
  include-all: true
  filter: ^(?i)(?=[^-]*(-|$)).*(美|us|usa|america|united states|日|jp|japan|tokyo)
  proxies:
  - Emby自动
  icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Media.png
- name: 香港策略
  type: select
  include-all: true
  filter: ^(?i)(?=[^-]*(-|$)).*(港|hk|hongkong|hong kong|🇭🇰)
  proxies:
  - 香港自动
  icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Hong_Kong.png
- name: 台湾策略
  type: select
  include-all: true
  filter: ^(?i)(?=[^-]*(-|$)).*(台|tw|taiwan|taipei|🇹🇼)
  proxies:
  - 台湾自动
  icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Taiwan.png
- name: 日本策略
  type: select
  include-all: true
  filter: ^(?i)(?=[^-]*(-|$)).*(日|jp|japan|tokyo|🇯🇵)
  proxies:
  - 日本自动
  icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Japan.png
- name: 狮城策略
  type: select
  include-all: true
  filter: ^(?i)(?=[^-]*(-|$)).*(新加坡|sg|singapore|🇸🇬|^新(?![线上最]))
  proxies:
  - 狮城自动
  icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Singapore.png
- name: 美国策略
